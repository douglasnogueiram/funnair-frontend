server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to backend with Basic Auth
    location /api/ {
        proxy_pass http://funnair-backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization "Basic dXNlcjp1c2VyMTIz";
        proxy_read_timeout 120s;
    }

    # Proxy RAG loader calls
    location /rag/ {
        proxy_pass http://funnair-rag-loader:8090/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    # Proxy TTS calls to agent-buyprocess
    location /agent/ {
        proxy_pass http://agent-buyprocess:8085/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # SPA fallback routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
